<div class="flex h-screen bg-bg overflow-hidden">

  <!-- Overlay móvil -->
  @if (sidebarOpen()) {
    <div
      class="fixed inset-0 bg-black/60 z-20 lg:hidden"
      (click)="closeSidebar()"
    ></div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed lg:static inset-y-0 left-0 z-30 w-64 bg-surface border-r border-border
           flex flex-col transition-transform duration-300 ease-in-out
           lg:translate-x-0"
    [class.translate-x-0]="sidebarOpen()"
    [class.-translate-x-full]="!sidebarOpen()"
  >
    <!-- Logo -->
    <div class="flex items-center justify-center py-6 border-b border-border">
      <img src="assets/images/logo.png" alt="Nova Inns" class="w-48 h-48 object-contain" />
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">

      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-brand/10 text-brand border-l-2 border-brand"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="closeSidebar()"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-text-secondary
                 hover:bg-hover hover:text-text-primary transition-colors border-l-2 border-transparent"
        >
          <!-- Bookings icon -->
          @if (item.icon === 'bookings') {
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          }
          <!-- Apartments icon -->
          @if (item.icon === 'apartments') {
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
          }
          <!-- Users icon -->
          @if (item.icon === 'users') {
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          }

          <span class="text-sm font-medium">{{ item.label }}</span>
        </a>
      }

    </nav>

    <!-- Logout -->
    <div class="p-3 border-t border-border">
      <button
        (click)="auth.logout()"
        class="flex items-center gap-3 w-full px-4 py-3 rounded-xl
               text-text-secondary hover:bg-error/10 hover:text-error
               transition-colors cursor-pointer"
      >
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span class="text-sm font-medium">Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Topbar móvil -->
    <header class="lg:hidden flex items-center gap-4 px-4 py-3 bg-surface border-b border-border">
      <button (click)="toggleSidebar()" class="text-text-secondary hover:text-text-primary cursor-pointer">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <img src="assets/images/logo.png" alt="Nova Inns" class="w-8 h-8 object-contain" />
      <span class="text-text-primary font-bold">Nova Inns</span>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>

  </div>
</div>
