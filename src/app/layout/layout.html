<div class="flex h-screen bg-bg">

  <!-- Overlay móvil -->
  @if (sidebarOpen()) {
    <div class="fixed inset-0 bg-black/60 z-20 lg:hidden" (click)="closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed lg:static inset-y-0 left-0 z-30 flex flex-col transition-all duration-300 ease-in-out lg:translate-x-0"
    [class]="collapsed()
      ? 'w-16 bg-surface border-r border-border'
      : 'w-64 bg-surface border-r border-border'"
    [class.translate-x-0]="sidebarOpen()"
    [class.-translate-x-full]="!sidebarOpen()"
  >
    <!-- Logo -->
    <div class="flex items-center justify-center py-6 border-b border-border">
      @if (collapsed()) {
        <img src="assets/images/LogoNovaInns.png" alt="Nova Inns" class="w-10 h-10 object-contain" />
      } @else {
        <img src="assets/images/LogoNovaInns.png" alt="Nova Inns" class="w-36 h-36 object-contain" />
      }
    </div>

    <!-- Collapse toggle (desktop only) -->
    <button (click)="toggleCollapsed()"
      class="hidden lg:flex absolute -right-3 top-24 w-6 h-6 bg-surface border border-border rounded-full items-center justify-center cursor-pointer z-10 hover:bg-hover transition-colors"
      [class.rotate-180]="collapsed()">
      <lucide-icon [img]="ChevronLeft" class="w-3.5 h-3.5 text-text-secondary" [strokeWidth]="2"/>
    </button>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-brand/10 text-brand border-l-2 border-brand"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="closeSidebar()"
          (mouseenter)="tooltip.set({ label: item.label, y: $event.clientY })"
          (mouseleave)="tooltip.set(null)"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-text-secondary
                 hover:bg-hover hover:text-text-primary transition-colors"
          [class]="collapsed() ? 'border-l-0 justify-center px-0' : 'border-l-2 border-transparent'"
        >
          <lucide-icon [img]="item.icon" class="w-5 h-5 shrink-0" [strokeWidth]="1.8"/>
          @if (!collapsed()) {
            <span class="text-sm font-medium">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <!-- Tooltip for collapsed nav -->
    @if (collapsed() && tooltip(); as t) {
      <div class="fixed z-[999] pointer-events-none" [style.top.px]="t.y" style="left: 68px;">
        <div class="bg-surface border border-border rounded-xl px-3 py-2 shadow-2xl whitespace-nowrap text-sm text-text-primary font-medium" style="transform: translateY(-50%);">
          {{ t.label }}
        </div>
      </div>
    }

    <!-- Logout -->
    <div class="p-3 border-t border-border">
      <button
        (click)="auth.logout()"
        (mouseenter)="tooltip.set({ label: 'Cerrar sesión', y: $event.clientY })"
        (mouseleave)="tooltip.set(null)"
        class="flex items-center gap-3 w-full px-4 py-3 rounded-xl
               text-text-secondary hover:bg-error/10 hover:text-error
               transition-colors cursor-pointer"
        [class]="collapsed() ? 'justify-center px-0' : ''"
      >
        <lucide-icon [img]="LogOut" class="w-5 h-5 shrink-0" [strokeWidth]="1.8"/>
        @if (!collapsed()) {
          <span class="text-sm font-medium">Cerrar sesión</span>
        }
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Topbar móvil -->
    <header class="lg:hidden flex items-center gap-4 px-4 py-3 bg-surface border-b border-border">
      <button (click)="toggleSidebar()" class="text-text-secondary hover:text-text-primary cursor-pointer">
        <lucide-icon [img]="Menu" class="w-6 h-6" [strokeWidth]="2"/>
      </button>
      <img src="assets/images/LogoNovaInns.png" alt="Nova Inns" class="w-8 h-8 object-contain" />
      <span class="text-text-primary font-bold">Nova Inns</span>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>

  </div>
</div>

<alert-nova />
