<div class="flex h-screen bg-bg overflow-hidden">

  <!-- Overlay móvil -->
  @if (sidebarOpen()) {
    <div class="fixed inset-0 bg-black/60 z-20 lg:hidden" (click)="closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed lg:static inset-y-0 left-0 z-30 w-64 bg-surface border-r border-border
           flex flex-col transition-transform duration-300 ease-in-out lg:translate-x-0"
    [class.translate-x-0]="sidebarOpen()"
    [class.-translate-x-full]="!sidebarOpen()"
  >
    <!-- Logo -->
    <div class="flex items-center justify-center py-6 border-b border-border">
      <img src="assets/images/logo.png" alt="Nova Inns" class="w-48 h-48 object-contain" />
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-brand/10 text-brand border-l-2 border-brand"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="closeSidebar()"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-text-secondary
                 hover:bg-hover hover:text-text-primary transition-colors border-l-2 border-transparent"
        >
          <lucide-icon [img]="item.icon" class="w-5 h-5 shrink-0" [strokeWidth]="1.8"/>
          <span class="text-sm font-medium">{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Logout -->
    <div class="p-3 border-t border-border">
      <button
        (click)="auth.logout()"
        class="flex items-center gap-3 w-full px-4 py-3 rounded-xl
               text-text-secondary hover:bg-error/10 hover:text-error
               transition-colors cursor-pointer"
      >
        <lucide-icon [img]="LogOut" class="w-5 h-5 shrink-0" [strokeWidth]="1.8"/>
        <span class="text-sm font-medium">Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Topbar móvil -->
    <header class="lg:hidden flex items-center gap-4 px-4 py-3 bg-surface border-b border-border">
      <button (click)="toggleSidebar()" class="text-text-secondary hover:text-text-primary cursor-pointer">
        <lucide-icon [img]="Menu" class="w-6 h-6" [strokeWidth]="2"/>
      </button>
      <img src="assets/images/logo.png" alt="Nova Inns" class="w-8 h-8 object-contain" />
      <span class="text-text-primary font-bold">Nova Inns</span>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>

  </div>
</div>
